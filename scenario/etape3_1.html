<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nabuzoko — Clé I (A–M)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    @page { size: A5 landscape; margin: 1.2cm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ede0c0;
      font-family: 'Lora', serif;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    h1 { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; color: #3a2005; text-align: center; }
    .subtitle { font-size: 0.82rem; color: #7a4f1a; text-align: center; font-style: italic; }
    .card {
      background: #fdf6e3;
      border: 2px solid #8b6030;
      border-radius: 4px;
      padding: 1rem 1.5rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 3px 4px 10px rgba(0,0,0,0.2);
    }
    .card h2 { font-family: 'Cinzel Decorative', serif; font-size: 0.85rem; color: #4a2a08; text-align: center; margin-bottom: 1rem; }

    .sym {
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 38px;
      border-color: #3a2005; border-style: solid; border-width: 0;
      position: relative; flex-shrink: 0;
    }
    .sym.dot::after {
      content: ''; position: absolute; width: 8px; height: 8px;
      background: #8b1010; border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    /* A–I sans point */
    .pg-A { border-right-width: 2.5px; border-bottom-width: 2.5px; }
    .pg-B { border-left-width: 2.5px; border-right-width: 2.5px; border-bottom-width: 2.5px; }
    .pg-C { border-left-width: 2.5px; border-bottom-width: 2.5px; }
    .pg-D { border-top-width: 2.5px; border-right-width: 2.5px; border-bottom-width: 2.5px; }
    .pg-E { border-width: 2.5px; }
    .pg-F { border-top-width: 2.5px; border-left-width: 2.5px; border-bottom-width: 2.5px; }
    .pg-G { border-top-width: 2.5px; border-right-width: 2.5px; }
    .pg-H { border-top-width: 2.5px; border-left-width: 2.5px; border-right-width: 2.5px; }
    .pg-I { border-top-width: 2.5px; border-left-width: 2.5px; }
    /* J–M avec point (mêmes formes que A–D) */
    .pg-J { border-right-width: 2.5px; border-bottom-width: 2.5px; }
    .pg-K { border-left-width: 2.5px; border-right-width: 2.5px; border-bottom-width: 2.5px; }
    .pg-L { border-left-width: 2.5px; border-bottom-width: 2.5px; }
    .pg-M { border-top-width: 2.5px; border-right-width: 2.5px; border-bottom-width: 2.5px; }

    .ref-row { display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap; }
    .ref-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .ref-letter { font-size: 0.8rem; font-weight: bold; color: #4a2a08; }
    .divider { border-top: 1px dashed #8b6030; margin: 0.8rem 0; }
    .section-label { font-size: 0.75rem; color: #7a4f1a; font-style: italic; text-align: center; margin-bottom: 0.5rem; }

    .warning {
      margin-top: 0.8rem;
      padding: 0.5rem 1rem;
      background: rgba(139,96,48,0.1);
      border: 1px solid rgba(139,96,48,0.4);
      border-radius: 3px;
      font-size: 0.78rem; color: #5a3810; text-align: center; font-style: italic;
    }
    @media print { body { background: white; } .card { box-shadow: none; } }
  </style>
</head>
<body>

<div>
  <h1>🐰 Clé I — Lettres A à M</h1>
  <p class="subtitle">Ta moitié du code Pig Pen · Ne montre pas ta page à ton équipier</p>
</div>

<div class="card">
  <h2>Ta grille de déchiffrement</h2>

  <p class="section-label">Lettres A à I — sans point</p>
  <div class="ref-row">
    <div class="ref-cell"><div class="sym pg-A"></div><span class="ref-letter">A</span></div>
    <div class="ref-cell"><div class="sym pg-B"></div><span class="ref-letter">B</span></div>
    <div class="ref-cell"><div class="sym pg-C"></div><span class="ref-letter">C</span></div>
    <div class="ref-cell"><div class="sym pg-D"></div><span class="ref-letter">D</span></div>
    <div class="ref-cell"><div class="sym pg-E"></div><span class="ref-letter">E</span></div>
    <div class="ref-cell"><div class="sym pg-F"></div><span class="ref-letter">F</span></div>
    <div class="ref-cell"><div class="sym pg-G"></div><span class="ref-letter">G</span></div>
    <div class="ref-cell"><div class="sym pg-H"></div><span class="ref-letter">H</span></div>
    <div class="ref-cell"><div class="sym pg-I"></div><span class="ref-letter">I</span></div>
  </div>

  <div class="divider"></div>

  <p class="section-label">Lettres J à M — avec point •</p>
  <div class="ref-row">
    <div class="ref-cell"><div class="sym pg-J dot"></div><span class="ref-letter">J</span></div>
    <div class="ref-cell"><div class="sym pg-K dot"></div><span class="ref-letter">K</span></div>
    <div class="ref-cell"><div class="sym pg-L dot"></div><span class="ref-letter">L</span></div>
    <div class="ref-cell"><div class="sym pg-M dot"></div><span class="ref-letter">M</span></div>
  </div>

  <div class="warning">
    Pour les symboles que tu ne reconnais pas → demande à ton équipier qui a la Clé II
  </div>
</div>

</body>
</html>
