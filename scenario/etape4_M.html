<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nabuzoko — Message 4</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    @page { size: A5; margin: 1.5cm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5ead0;
      font-family: 'Lora', serif;
      padding: 2rem 1.5rem;
      display: flex; flex-direction: column; align-items: center;
      gap: 1.5rem; min-height: 100vh; justify-content: center;
    }
    h1 { font-family: 'Cinzel Decorative', serif; font-size: 1.2rem; color: #3a2005; text-align: center; }
    .subtitle { font-size: 0.85rem; color: #7a4f1a; text-align: center; font-style: italic; }

    .card {
      background: rgba(253,246,227,0.95);
      border: 2.5px solid #8b6030;
      border-radius: 4px;
      padding: 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 4px 5px 14px rgba(0,0,0,0.25);
    }
    .card h2 { font-family: 'Cinzel Decorative', serif; font-size: 0.9rem; color: #4a2a08; text-align: center; margin-bottom: 1.8rem; }

    /* Message: ⭐🐣 🍀🥕🐇🌾🔑🌱🍫🐣 */
    .message {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 2.2rem;
      line-height: 1.4;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .word-gap { width: 18px; flex-shrink: 0; display: inline-block; }

    .blanks {
      display: flex; justify-content: center; gap: 0.5rem;
      flex-wrap: wrap; margin-top: 1.5rem;
    }
    .blank {
      width: 28px; height: 2px; background: #8b6030;
      display: inline-block; margin: 0 2px;
    }

    .instruction {
      margin-top: 1.5rem;
      padding: 0.6rem 1rem;
      border: 1px dashed rgba(120,80,20,0.45);
      border-radius: 3px;
      font-size: 0.78rem; color: #5a3810; text-align: center;
      font-style: italic; line-height: 1.7;
    }
    @media print { body { background: white; } .card { box-shadow: none; } }
  </style>
</head>
<body>

<div>
  <h1>🐰 Message de Nabuzoko</h1>
  <p class="subtitle">Utilisez vos deux codes ensemble pour déchiffrer</p>
</div>

<div class="card">
  <h2>— Étape 4 —</h2>

  <!--
    LA MONSTERA
    L=⭐  A=🐣  |  M=🍀  O=🥕  N=🐇  S=🌾  T=🔑  E=🌱  R=🍫  A=🐣
  -->
  <div class="message">
    <span>⭐</span><span>🐣</span>
    <span class="word-gap"></span>
    <span>🍀</span><span>🥕</span><span>🐇</span><span>🌾</span><span>🔑</span><span>🌱</span><span>🍫</span><span>🐣</span>
  </div>

  <!-- Lignes pour écrire la réponse -->
  <div class="blanks">
    <span class="blank"></span><span class="blank"></span>
    <span style="width:12px"></span>
    <span class="blank"></span><span class="blank"></span><span class="blank"></span><span class="blank"></span><span class="blank"></span><span class="blank"></span><span class="blank"></span><span class="blank"></span>
  </div>

  <div class="instruction">
    Code Secret I déchiffre certains émojis · Code Secret II déchiffre les autres<br>
    La réponse vous dit où chercher le prochain œuf.
  </div>
</div>

</body>
</html>
