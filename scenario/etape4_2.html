<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nabuzoko — Code Secret II (N–Z)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    @page { size: A5; margin: 1.2cm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #d0e0f0;
      font-family: 'Lora', serif;
      padding: 1.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
    }
    h1 { font-family: 'Cinzel Decorative', serif; font-size: 1.05rem; color: #102040; text-align: center; }
    .subtitle { font-size: 0.82rem; color: #304060; text-align: center; font-style: italic; }

    .card {
      background: #eaf4ff;
      border: 2px solid #3060a0;
      border-radius: 4px;
      padding: 1.2rem 1.5rem;
      width: 100%; max-width: 380px;
      box-shadow: 3px 4px 10px rgba(0,0,0,0.18);
    }
    .card h2 { font-family: 'Cinzel Decorative', serif; font-size: 0.82rem; color: #102040; text-align: center; margin-bottom: 1rem; }

    table { width: 100%; border-collapse: collapse; }
    td {
      padding: 0.45rem 0.5rem;
      font-size: 1.1rem;
      border-bottom: 1px solid rgba(48,96,160,0.2);
      text-align: center;
    }
    td:first-child { font-weight: bold; color: #102040; font-size: 0.95rem; width: 30%; }
    td:last-child { font-size: 1.5rem; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(odd) { background: rgba(48,96,160,0.05); }

    .warning {
      margin-top: 0.8rem;
      padding: 0.5rem 0.8rem;
      background: rgba(48,96,160,0.08);
      border: 1px solid rgba(48,96,160,0.4);
      border-radius: 3px;
      font-size: 0.75rem; color: #203050; text-align: center; font-style: italic; line-height: 1.6;
    }
    @media print { body { background: white; } .card { box-shadow: none; } }
  </style>
</head>
<body>

<div>
  <h1>🐰 Code Secret II — N à Z</h1>
  <p class="subtitle">Ta moitié du code · Garde-la pour toi</p>
</div>

<div class="card">
  <h2>Ta table de correspondance</h2>
  <table>
    <tr><td>N</td><td>=</td><td>🐇</td></tr>
    <tr><td>O</td><td>=</td><td>🥕</td></tr>
    <tr><td>P</td><td>=</td><td>🪺</td></tr>
    <tr><td>Q</td><td>=</td><td>🌙</td></tr>
    <tr><td>R</td><td>=</td><td>🍫</td></tr>
    <tr><td>S</td><td>=</td><td>🌾</td></tr>
    <tr><td>T</td><td>=</td><td>🔑</td></tr>
    <tr><td>U</td><td>=</td><td>🏆</td></tr>
    <tr><td>V</td><td>=</td><td>🎀</td></tr>
    <tr><td>W</td><td>=</td><td>🌺</td></tr>
    <tr><td>X</td><td>=</td><td>🎪</td></tr>
    <tr><td>Y</td><td>=</td><td>🪴</td></tr>
    <tr><td>Z</td><td>=</td><td>🌍</td></tr>
  </table>
  <div class="warning">
    Pour les émojis que tu ne trouves pas dans ta table → ton équipier a la réponse
  </div>
</div>

</body>
</html>
