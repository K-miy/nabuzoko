<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nabuzoko — Étape 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    @page {
      size: A4;
      margin: 2cm;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f5ead0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      font-family: 'UnifrakturMaguntia', cursive;
    }

    .parchment {
      background:
        radial-gradient(ellipse at 20% 10%, rgba(180,130,60,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(140,90,30,0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(245,230,190,1) 0%, rgba(225,200,150,1) 100%);
      border: 3px solid #8b6030;
      border-radius: 4px;
      box-shadow:
        inset 0 0 40px rgba(100,60,10,0.2),
        4px 6px 20px rgba(0,0,0,0.4);
      padding: 3rem 3.5rem;
      max-width: 680px;
      width: 100%;
      position: relative;
    }

    /* Coins décorés */
    .parchment::before,
    .parchment::after {
      content: '✦';
      position: absolute;
      font-size: 1.4rem;
      color: #7a4f1a;
      opacity: 0.6;
    }
    .parchment::before { top: 0.6rem; left: 0.8rem; }
    .parchment::after  { bottom: 0.6rem; right: 0.8rem; }

    .inner {
      border: 1px solid rgba(120,80,20,0.35);
      padding: 2rem 2.5rem;
      /* LE MIROIR : tout le contenu est retourné horizontalement */
      transform: scaleX(-1);
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .lapin {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 0.3rem;
      /* Le lapin lui-même est re-retourné pour rester lisible comme décoration */
      display: inline-block;
      transform: scaleX(-1);
    }

    h1 {
      font-size: 2.2rem;
      color: #4a2a08;
      letter-spacing: 0.05em;
      line-height: 1.2;
    }

    .divider {
      text-align: center;
      color: #8b6030;
      font-size: 1.2rem;
      margin: 1.2rem 0;
      letter-spacing: 0.4em;
    }

    p {
      font-size: 1.55rem;
      color: #3a2005;
      line-height: 1.8;
      margin-bottom: 1rem;
      text-align: center;
    }

    .calcul {
      background: rgba(120,80,20,0.08);
      border: 1px dashed rgba(120,80,20,0.4);
      border-radius: 3px;
      padding: 1rem 1.5rem;
      margin: 1.4rem 0;
      text-align: center;
    }

    .calcul p {
      margin: 0;
      font-size: 1.65rem;
      color: #3a2005;
      line-height: 2;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      color: #6b4515;
      font-size: 1.1rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="parchment">
    <div class="inner">

      <div class="header">
        <span class="lapin">🐰</span>
        <h1>Message de Nabuzoko</h1>
      </div>

      <div class="divider">— ✦ —</div>

      <p>
        Vingt échanges de balles,<br>
        pas un de moins.
      </p>

      <div class="divider">— ✦ —</div>

      <p>Ton premier chiffre :</p>

      <div class="calcul">
        <p>
          ( pattes d'un lapin<br>
          × oreilles de Nabuzoko )<br>
          ÷ saisons dans une année
        </p>
      </div>

      <div class="divider">— ✦ —</div>

      <div class="footer">
        Réussissez l'épreuve pour trouver la suite.
      </div>

    </div>
  </div>
</body>
</html>
